# ── Moonbloom — Netlify config ────────────────────────────────────────────────
# Netlify site: moonbloom.netlify.app
# In the Netlify dashboard: Base directory = "moonbloom", Publish directory = "."
# ──────────────────────────────────────────────────────────────────────────────

[build]
  publish = "."

# ── Security headers (applied to every response) ──────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options    = "nosniff"
    X-Frame-Options           = "DENY"
    Referrer-Policy           = "strict-origin-when-cross-origin"
    Permissions-Policy        = "camera=(), microphone=(), geolocation=()"

# ── HTML files: always re-validate, never serve stale ─────────────────────────
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# ── Redirect Netlify subdomain to custom domain ───────────────────────────────
[[redirects]]
  from    = "https://moonbloom.netlify.app/*"
  to      = "https://moonbloom.quest/:splat"
  status  = 301
  force   = true
